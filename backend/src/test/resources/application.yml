spring:
  datasource:
    url: jdbc:h2:mem:kylinops-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

kylinops:
  audit:
    enabled: true
    page-size: 50
  executor:
    whitelisted-services:
      - nginx
      - mysql
      - redis
      - ssh
      - docker