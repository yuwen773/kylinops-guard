# ============================================================
# 麒麟安全智能运维 Agent — 共享配置（所有 Profile）
# Profile 特定配置见 application-{dev,test,prod}.yml
# ============================================================

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Tomcat max-swallow-size：请求处理完成后，Tomcat 还能「读后丢弃」多少
  # body 字节（用于流式上传中客户端提前中断后清理残留 body）。注意这不是请
  # 求体大小限制；JSON 请求体由 ChatRequest.content @Size(16384) 在应用层
  # 校验（@Size 按 Java char 计数，UTF-8 字节数视字符集 1~4 倍不等）。
  # 这里设为 16KB 是防御性兜底，避免异常连接在 Tomcat 层消费过多字节。
  max-swallow-size: 16KB

spring:
  application:
    name: kylin-ops-guard

  # Jackson serialization
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Multipart 上限：用于文件上传端点（非 chat 路径）。chat 走 JSON @RequestBody，
  # 由 ChatRequest.content @Size(16384) 在应用层校验，与 multipart 配置无关。
  servlet:
    multipart:
      max-request-size: 32MB
      max-file-size: 32MB

  jpa:
    open-in-view: false

# ============================================================
# Application custom configuration
# ============================================================

kylinops:
  version: 0.1.0
  app:
    name: 麒麟安全智能运维 Agent
    codename: KylinOps Guard
    environment: dev
  llm:
    # LLM is optional — when unavailable, falls back to rule-based intent
    enabled: false
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:deepseek-chat}
  security:
    # Maximum pending actions (L2 confirmations) per session
    max-pending-actions: 10
    # Default timeout for L2 confirmations (ms)
    pending-action-timeout-ms: 300000
  audit:
    # Enable audit log persistence
    enabled: true
    # Max log entries per page
    page-size: 50
  executor:
    # Services allowed for restart
    whitelisted-services:
      - nginx
      - mysql
      - redis
      - ssh
      - docker
  auth:
    # 单管理员登录 — username 来自环境变量，默认 admin
    username: ${KYLINOPS_ADMIN_USERNAME:admin}
    # BCrypt hash — dev/test profile 在 application-{dev,test}.yml 中给出占位 hash
    # 部署时必须显式注入 KYLINOPS_ADMIN_PASSWORD_HASH（fail-closed validator 检查）
    password-hash: ${KYLINOPS_ADMIN_PASSWORD_HASH:}
    idle-timeout: 30m
    absolute-timeout: 8h
    max-failures: 5
    lock-duration: 15m
    # /api/chat/send 限流：每会话每窗口最多请求数
    chat-rate-limit: 30
    chat-rate-window: 1m
