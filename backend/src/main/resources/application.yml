# ============================================================
# 麒麟安全智能运维 Agent — Application Configuration
# ============================================================

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  # Tomcat max-swallow-size：请求处理完成后，Tomcat 还能「读后丢弃」多少
  # body 字节（用于流式上传中客户端提前中断后清理残留 body）。注意这不是请
  # 求体大小限制；JSON 请求体由 ChatRequest.content @Size(16384) 在应用层
  # 校验（@Size 按 Java char 计数，UTF-8 字节数视字符集 1~4 倍不等）。
  # 这里设为 16KB 是防御性兜底，避免异常连接在 Tomcat 层消费过多字节。
  max-swallow-size: 16KB

spring:
  application:
    name: kylin-ops-guard

  # H2 File Mode (P0)
  datasource:
    url: jdbc:h2:file:./data/kylinops;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: kylinops
    password: kylinops
  # Flyway 由 test profile 显式启用；默认 dev profile 仍由 JPA ddl-auto: update 维护 schema。
  # Phase 1 Task 3 拆分 dev/test/postgres profile 后会改为 dev 默认启用 Flyway。
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

  # Jackson serialization
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null

  # Multipart 上限：用于文件上传端点（非 chat 路径）。chat 走 JSON @RequestBody，
  # 由 ChatRequest.content @Size(16384) 在应用层校验，与 multipart 配置无关。
  # max-request-size = 整个 multipart 请求体上限；max-file-size = 单个文件上限。
  servlet:
    multipart:
      max-request-size: 32MB
      max-file-size: 32MB

# ============================================================
# Application custom configuration
# ============================================================

kylinops:
  version: 0.1.0
  app:
    name: 麒麟安全智能运维 Agent
    codename: KylinOps Guard
    environment: dev
  llm:
    # LLM is optional — when unavailable, falls back to rule-based intent
    enabled: false
    base-url: ${LLM_BASE_URL:}
    api-key: ${LLM_API_KEY:}
    model: ${LLM_MODEL:deepseek-chat}
  security:
    # Maximum pending actions (L2 confirmations) per session
    max-pending-actions: 10
    # Default timeout for L2 confirmations (ms)
    pending-action-timeout-ms: 300000
  audit:
    # Enable audit log persistence
    enabled: true
    # Max log entries per page
    page-size: 50
  executor:
    # Services allowed for restart
    whitelisted-services:
      - nginx
      - mysql
      - redis
      - ssh
      - docker
