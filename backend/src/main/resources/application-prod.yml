# ============================================================
# Production Profile — PostgreSQL + Flyway + 安全加固
# ============================================================
spring:
  datasource:
    url: ${KYLINOPS_DB_URL:}
    driver-class-name: org.postgresql.Driver
    username: ${KYLINOPS_DB_USERNAME:}
    password: ${KYLINOPS_DB_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholder-replacement: true
    placeholders:
      # PostgreSQL 兼容：TEXT 而非 CLOB
      lob_type: TEXT
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  h2:
    console:
      enabled: false
