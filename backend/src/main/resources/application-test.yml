# ============================================================
# Test Profile — H2 内存数据库 + Flyway 迁移验证
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:kylinops-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholder-replacement: true
    placeholders:
      # H2 兼容：CLOB 而非 TEXT
      lob_type: CLOB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
server:
  servlet:
    session:
      timeout: 30m
      cookie:
        name: KYLINOPS_SESSION
        http-only: true
        same-site: strict
        path: /
        secure: false   # test HTTP 本地

# ============================================================
# P2-T2 单管理员登录 — test 默认 BCrypt（与 AuthControllerTest 对齐）
# password-hash 对应明文 "test-admin-pwd"
# ============================================================
kylinops:
  auth:
    username: ${KYLINOPS_ADMIN_USERNAME:admin}
    password-hash: ${KYLINOPS_ADMIN_PASSWORD_HASH:$2a$10$ZZ80ReuZWzJ89A5VNHOMPOR4bEI22exOhHGtgeplOkwBwXGvQNAGS}
    idle-timeout: 30m
    absolute-timeout: 8h
    max-failures: 5
    lock-duration: 15m
  # P1-01: 测试环境强制关闭通知,零外网请求
  notification:
    enabled: false
    dry-run: false
    channels: []
    # 管理平面 — 测试使用合法 Base64 32 字节主密钥,验证 Bean 绑定
    # (对应 32 字节 0x42 重复,仅用于单元测试)
    management:
      master-key: ${KYLINOPS_NOTIFICATION_MASTER_KEY:QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=}
      public-base-url: ${KYLINOPS_PUBLIC_BASE_URL:http://localhost:8080}
