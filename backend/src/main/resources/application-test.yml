# ============================================================
# Test Profile — H2 内存数据库 + Flyway 迁移验证
# ============================================================
spring:
  datasource:
    url: jdbc:h2:mem:kylinops-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    placeholder-replacement: true
    placeholders:
      # H2 兼容：CLOB 而非 TEXT
      lob_type: CLOB
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
