# ============================================================
# Nginx site — 麒麟安全智能运维 Agent (KylinOps Guard)
# ============================================================
# 安装:
#   sudo cp deploy/nginx/kylinops-guard.conf /etc/nginx/conf.d/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# 假设:
#   * 前端 dist 在 /var/lib/kylinops/frontend/dist/
#   * 后端在 127.0.0.1:8080 监听
#   * TLS 证书路径已签发 (Let's Encrypt / 内部 CA)
# ============================================================
#
# 安全契约 (P4-T1):
#   * proxy_pass 指向 127.0.0.1:8080 (不暴露公网 backend)
#   * 请求体 ≤ 1m (Spring 应用层 @Size(16384 chars) 是真正限制; 这是兜底)
#   * 安全响应头: X-Frame-Options DENY / nosniff / Referrer-Policy / HSTS
#   * TLSv1.2 + TLSv1.3 only
#   * upstream keepalive (proxy_http_version 1.1)
# ============================================================

# ---- 后端 upstream (含 keepalive) ----
upstream kylinops_backend {
    server 127.0.0.1:8080;
    keepalive 16;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt http-01 challenge 需要 .well-known 放行
    location /.well-known/acme-challenge/ {
        root /var/lib/kylinops/certbot;
    }

    # 其余全部 301 到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS 主站 ----
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ---- TLS 证书 (占位符, 部署时由运维签发) ----
    ssl_certificate     /etc/kylinops/tls/fullchain.pem;
    ssl_certificate_key /etc/kylinops/tls/privkey.pem;

    # ---- TLS 协议 + 加密套件 ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;   # 1.3 不允许手工指定, 1.2 用默认即可
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- 静态资源 (Vue 3 dist) ----
    root /var/lib/kylinops/frontend/dist;
    index index.html;

    # 默认 client_max_body_size 1m
    client_max_body_size 1m;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;

    # ---- 安全响应头 ----
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # CSP: 仅允许同源资源 (默认 dev 工具链无 CDN)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'" always;
    # 隐藏 nginx 版本
    server_tokens off;

    # ---- gzip (静态资源) ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ---- 路由 1: 前端 SPA ----
    location / {
        try_files $uri $uri/ /index.html;
        # 静态资源可缓存 (Vite 产物自带 hash)
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- 路由 2: 后端 API ----
    location /api/ {
        proxy_pass http://kylinops_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        # 超时 — PRD §12.3: 单工具 ≤ 3s, 普通 chat ≤ 10s, healthcheck ≤ 30s
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        # 缓冲 — 关闭以支持流式 (SSE 风格的 chat 响应)
        proxy_buffering off;
        proxy_request_buffering off;

        # 不缓存 API 响应
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # ---- 健康端点直放 ----
    location = /api/health {
        proxy_pass http://kylinops_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ---- 禁止访问隐藏文件 ----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
