# ============================================================
# CI/CD Pipeline — 麒麟安全智能运维 Agent (KylinOps Guard)
# ============================================================
# 每次 push master / PR → 跑测试 + 打包
# 每次 push tag v* → 发布到 GitHub Releases
# ============================================================

name: KylinOps Guard CI

on:
  push:
    branches: [master, main]
    tags: ['v*']
  pull_request:
    branches: [master, main]

jobs:
  # ============================================================
  # 1. Backend — 测试 + 编译
  # ============================================================
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run tests
        run: mvn -B test

      - name: Package (skip tests)
        run: mvn -B clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/kylin-ops-guard.jar
          retention-days: 30

  # ============================================================
  # 2. Frontend — 类型检查 + 单元测试 + 构建
  # ============================================================
  frontend:
    name: Frontend (Node 20 + Vue 3)
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --run

      - name: Build production
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 30

  # ============================================================
  # 3. Deploy tarball — 打包可部署产物
  # ============================================================
  package:
    name: Package deploy tarball
    needs: [backend, frontend]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download backend JAR
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: _package/

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: _package/dist/

      - name: Copy deploy scripts
        run: |
          mkdir -p _package/deploy
          cp -r deploy/scripts _package/deploy/
          cp -r deploy/config _package/deploy/ 2>/dev/null || true

      # P4-T1: systemd unit + nginx site 一起打包, 部署机可直接 cp 到 /etc/
      - name: Copy systemd and nginx configs
        run: |
          mkdir -p _package/deploy/systemd _package/deploy/nginx
          cp -r deploy/systemd/* _package/deploy/systemd/
          cp -r deploy/nginx/* _package/deploy/nginx/

      # P4-T1: 显式排除含凭据文件 (尽管这些文件不应进 git, 二次保险)
      - name: Verify no secrets in package
        run: |
          if find _package -type f \( -name '.env' -o -name 'application-local.yml' -o -name 'kylinops.env' \) | grep -q .; then
            echo "ERROR: secret files detected in package" >&2
            find _package -type f \( -name '.env' -o -name 'application-local.yml' -o -name 'kylinops.env' \) >&2
            exit 1
          fi
          echo "OK: no secret files in package"

      - name: Copy application config
        run: |
          mkdir -p _package/config
          # 生产配置和种子配置
          cp backend/src/main/resources/application.yml _package/config/ 2>/dev/null || true
          cp backend/src/main/resources/application-h2.yml _package/config/ 2>/dev/null || true

      - name: Create version file
        run: |
          echo "KylinOps Guard Deploy Package" > _package/VERSION
          echo "Built: $(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> _package/VERSION
          echo "Commit: ${{ github.sha }}" >> _package/VERSION
          echo "Ref: ${{ github.ref }}" >> _package/VERSION

      - name: Bundle tarball
        run: |
          cd _package
          tar czf ../kylinops-guard.tar.gz \
            kylin-ops-guard.jar \
            dist/ \
            deploy/ \
            config/ \
            VERSION
          cd ..
          ls -lh kylinops-guard.tar.gz

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: kylinops-tarball
          path: kylinops-guard.tar.gz
          retention-days: 30

      # 打 tag 时发布到 GitHub Releases
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: kylinops-guard.tar.gz
          # 不启用 generate_release_notes（需要额外 API scope）
          generate_release_notes: false
